# ═══════════════════════════════════════════════════════════════
#              TrendRadar 专属配置 · 教主版
#              起草时间: 2026-06-29 21:41
#              起草人: 张无忌（明教军师）
# ═══════════════════════════════════════════════════════════════
#
# 关键决策（教主钦定）：
#   · 平台：11 个全保留
#   · 调度：night_owl（午后速览 + 深夜汇总）
#   · 报告模式：current（当前榜单）
#   · AI 分析：关闭（0 token）
#   · 飞书签名校验：开启
#


# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  timezone: "Asia/Shanghai"
  show_version_update: true


# ===============================================================
# 1.5 调度系统 —— night_owl（午后速览 + 深夜汇总）
#
# 预设行为：
#   · 14:00 左右做一次午后速览
#   · 23:00 左右做一次深夜全天汇总
#   · 其他时段不主动推
#
# 详细时间可在 config/timeline.yaml 里微调
# ===============================================================
schedule:
  enabled: true                         # 启用 timeline 调度
  preset: "night_owl"                   # 教主钦定


# ===============================================================
# 2. 数据源 - 热榜平台（11 个全保留）
# ===============================================================
platforms:
  enabled: true
  api_url: ""
  sources:
    - id: "toutiao"
      name: "今日头条"
      expected_domain: "toutiao.com"
    - id: "baidu"
      name: "百度热搜"
      expected_domain: "baidu.com"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
      expected_domain: "wallstreetcn.com"
    - id: "thepaper"
      name: "澎湃新闻"
      expected_domain: "thepaper.cn"
    - id: "bilibili-hot-search"
      name: "bilibili 热搜"
      expected_domain: "bilibili.com"
    - id: "cls-hot"
      name: "财联社热门"
      expected_domain: "cls.cn"
    - id: "ifeng"
      name: "凤凰网"
      expected_domain: "ifeng.com"
    - id: "tieba"
      name: "贴吧"
      expected_domain: "baidu.com"
    - id: "weibo"
      name: "微博"
      expected_domain: "weibo.com"
    - id: "douyin"
      name: "抖音"
      expected_domain: "douyin.com"
    - id: "zhihu"
      name: "知乎"
      expected_domain: "zhihu.com"


# ===============================================================
# 3. 数据源 - RSS 订阅（先关掉，专注热榜）
# ===============================================================
rss:
  enabled: false                        # 暂不启用 RSS，专注热榜

  freshness_filter:
    enabled: true
    max_age_days: 1

  feeds: []


# ===============================================================
# 4. 报告模式 —— current（当前榜单）
# ===============================================================
report:
  mode: "current"                       # 教主钦定
  display_mode: "keyword"               # 按关键词分组
  sort_by_position_first: false         # 按匹配条数排序
  rank_threshold: 5
  max_news_per_keyword: 10              # 每个关键词最多显示 10 条


# ===============================================================
# 4.5 筛选策略 —— 关键词匹配（0 token）
# ===============================================================
filter:
  method: "keyword"                     # 教主钦定：纯关键词，不消耗 token
  priority_sort_enabled: false


# ===============================================================
# 4.6 AI 智能筛选 —— 关闭（教主钦定）
# ===============================================================
# filter.method=keyword 时，本节全部不生效
# 留空注释占位，将来要开 AI 时改这里
ai_filter:
  enabled: false                        # 关闭
  batch_size: 200
  batch_interval: 2
  min_score: 0.7
  interests_file: "ai_interests.txt"
  provider:
    api_key: ""                         # 暂不填
    base_url: ""
    model_name: ""


# ===============================================================
# 5. 推送渠道 —— 飞书 Webhook
# ===============================================================
notification:
  enabled: true
  channels:
    feishu:
      enabled: true
      webhook_url: "${FEISHU_WEBHOOK_URL}"   # 从 GitHub Secrets 读取
      # sign_secret: removed (timestamp sync issue)   # 签名校验密钥（教主钦定开启）
      message_type: "interactive"            # 飞书支持交互式卡片
      at_user_ids: []                        # 不 @ 任何人


# ===============================================================
# 6. AI 分析功能 —— 关闭（教主钦定 0 token）
# ===============================================================
ai_analysis:
  enabled: false                        # 关闭
  provider:
    api_key: ""
    base_url: ""
    model_name: ""


# ===============================================================
# 7. 存储与历史
# ===============================================================
storage:
  enabled: true
  retention_days: 30                    # 保留 30 天历史


# ===============================================================
# 8. 调试与日志
# ===============================================================
debug:
  enabled: false
  log_level: "INFO"